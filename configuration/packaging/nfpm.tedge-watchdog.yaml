# yaml-language-server: $schema=https://nfpm.goreleaser.com/static/schema.json
---
name: tedge-watchdog
description: |
  tedge-watchdog checks the health of all the thin-edge.io components/services.
arch: "${PKG_ARCH}"
platform: "linux"
version: "${GIT_SEMVER}"
section: misc
priority: "optional"
maintainer: "thin-edge.io team <info@thin-edge.io>"
vendor: "thin-edge.io"
homepage: "https://thin-edge.io"
license: "Apache-2.0"

depends:
  - tedge-agent

replaces:
  - tedge_watchdog

conflicts:
  - tedge_watchdog (<= 0.8.1)

recommends:
  - mosquitto

deb:
  fields:
    Vcs-Browser: ${CI_PROJECT_URL}
    Vcs-Git: ${CI_PROJECT_URL}
  compression: xz
  breaks:
    - tedge_watchdog (<= 0.8.1)

contents:
  # binary
  - src: .build/tedge-watchdog
    dst: /usr/bin/

  # service definitions
  - src: ./configuration/init/systemd/tedge-watchdog.service
    dst: /lib/systemd/system/
    file_info:
      mode: 0644
    packager: deb

  - src: ./configuration/init/systemd/tedge-watchdog.service
    dst: /lib/systemd/system/
    file_info:
      mode: 0644
    packager: rpm

  # Symlink for backwards compatibility
  # Deprecate: Remove symlink in 1.x release
  - src: /usr/bin/tedge-watchdog
    dst: /usr/bin/tedge_watchdog
    type: symlink

scripts:
  postinstall: configuration/debian/tedge-watchdog/postinst
  preremove: configuration/debian/tedge-watchdog/prerm
