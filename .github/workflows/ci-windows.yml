name: Windows CI

on:
  push:
    branches:
      - feat/windows-port-phase1
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  test-windows:
    name: Build and test (windows-latest)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Retrieve MSRV
        id: rust_version
        uses: SebRollen/toml-action@v1.2.0
        with:
          file: Cargo.toml
          field: "workspace.package.rust-version"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust_version.outputs.value }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      # Compilation check — fast feedback before spending time building test binaries.
      # tedge-p11-server is unix-only (gated with #![cfg(unix)]) and has no main on Windows.
      - name: cargo check
        run: >
          cargo check
          --workspace
          --exclude tedge-p11-server
        shell: pwsh

      # Mirror the Linux CI test invocation (minus coverage).
      # Tests use rumqttd as an embedded broker — no external Mosquitto needed.
      # Unix-specific tests are skipped via #[cfg_attr(not(unix), ignore)] or
      # #[cfg_attr(windows, ignore)] annotations.
      - name: cargo nextest run
        run: >
          cargo nextest run
          --no-fail-fast
          --locked
          --workspace
          --exclude tedge-p11-server
          --all-features
          --all-targets
        shell: pwsh

      # Build the tedge binary as a debug artifact for manual startup diagnosis.
      # Runs even if tests fail so the artifact is always available for investigation.
      # Debug build preserves symbols for better RUST_BACKTRACE output.
      - name: Build tedge binary (debug)
        if: always()
        run: cargo build --package tedge --locked
        shell: pwsh

      - name: Upload tedge binary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tedge-windows-debug
          path: |
            target/debug/tedge.exe
            configuration/contrib/sm-plugins/winget.ps1
            configuration/contrib/sm-plugins/install.ps1
          retention-days: 14
