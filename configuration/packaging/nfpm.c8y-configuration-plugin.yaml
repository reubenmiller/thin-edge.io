# yaml-language-server: $schema=https://nfpm.goreleaser.com/static/schema.json
---
name: c8y-configuration-plugin
description: |
  Thin-edge device configuration management for Cumulocity
arch: "${PKG_ARCH}"
platform: "linux"
version: "${GIT_SEMVER}"
section: "default"
priority: "optional"
maintainer: "thin-edge.io team <info@thin-edge.io>"
vendor: "thin-edge.io"
homepage: "https://thin-edge.io"
license: "Apache-2.0"

replaces:
  - c8y_configuration_plugin
conflicts:
  - c8y_configuration_plugin (<= 0.8.1)
recommends:
  - mosquitto

deb:
  fields:
    Vcs-Browser: ${CI_PROJECT_URL}
    Vcs-Git: ${CI_PROJECT_URL}
  compression: xz
  breaks:
    - c8y_configuration_plugin (<= 0.8.1)

contents:
  # binary
  - src: .build/c8y-configuration-plugin
    dst: /usr/bin/
    file_info:
      mode: 755

  # service definitions
  - src: ./configuration/init/systemd/c8y-configuration-plugin.service
    dst: /lib/systemd/system/
    file_info:
      mode: 644

  # Symlink for backwards compatibility
  # Deprecate: Remove symlink in 1.x release
  - src: /usr/bin/c8y-configuration-plugin
    dst: /usr/bin/c8y_configuration_plugin
    type: symlink

scripts:
  postinstall: configuration/debian/c8y-configuration-plugin/postinst
  preremove: configuration/debian/c8y-configuration-plugin/prerm
