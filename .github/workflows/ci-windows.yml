name: Windows CI

on:
  push:
    branches:
      - feat/windows-port-phase1
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  test-windows:
    name: Build and test (windows-latest)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Retrieve MSRV
        id: rust_version
        uses: SebRollen/toml-action@v1.2.0
        with:
          file: Cargo.toml
          field: "workspace.package.rust-version"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust_version.outputs.value }}

      - uses: Swatinem/rust-cache@v2

      # Compilation check first — fast feedback before spending time on test binaries.
      # Tests use rumqttd as an embedded broker so no external Mosquitto needed.
      - name: cargo check
        run: >
          cargo check
          --workspace
          --exclude tedge-p11-server
        shell: pwsh

      # Run lib and bin unit tests across the workspace.
      # Unix-specific tests are skipped via #[cfg_attr(not(unix), ignore)].
      # Exclude tedge-p11-server (unix-only binary).
      # --lib --bins avoids doc-tests which have pre-existing failures unrelated to Windows.
      - name: cargo test
        run: >
          cargo test
          --workspace
          --exclude tedge-p11-server
          --lib
          --bins
        shell: pwsh
