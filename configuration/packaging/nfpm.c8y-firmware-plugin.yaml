# yaml-language-server: $schema=https://nfpm.goreleaser.com/static/schema.json
---
name: c8y-firmware-plugin
description: |
  Thin-edge device firmware management for Cumulocity
arch: "${PKG_ARCH}"
platform: "linux"
version: "${GIT_SEMVER}"
section: misc
priority: "optional"
maintainer: "thin-edge.io team <info@thin-edge.io>"
vendor: "thin-edge.io"
homepage: "https://thin-edge.io"
license: "Apache-2.0"

depends:
  - tedge-agent

recommends:
  - mosquitto

deb:
  fields:
    Vcs-Browser: ${CI_PROJECT_URL}
    Vcs-Git: ${CI_PROJECT_URL}
  compression: xz

contents:
  # binary
  - src: .build/c8y-firmware-plugin
    dst: /usr/bin/

  # service definitions
  - src: ./configuration/init/systemd/c8y-firmware-plugin.service
    dst: /lib/systemd/system/
    file_info:
      mode: 0644
    packager: deb

  - src: ./configuration/init/systemd/c8y-firmware-plugin.service
    dst: /lib/systemd/system/
    file_info:
      mode: 0644
    packager: rpm

scripts:
  postinstall: configuration/debian/c8y-firmware-plugin/postinst
  preremove: configuration/debian/c8y-firmware-plugin/prerm
