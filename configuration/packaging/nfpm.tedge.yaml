# yaml-language-server: $schema=https://nfpm.goreleaser.com/static/schema.json
---
name: tedge
description: |
  tedge is the cli tool for thin-edge.io
arch: "${PKG_ARCH}"
platform: "linux"
version: "${GIT_SEMVER}"
section: "default"
priority: "optional"
maintainer: "thin-edge.io team <info@thin-edge.io>"
vendor: "thin-edge.io"
homepage: "https://thin-edge.io"
license: "Apache-2.0"

recommends:
  - mosquitto

deb:
  fields:
    Vcs-Browser: ${CI_PROJECT_URL}
    Vcs-Git: ${CI_PROJECT_URL}
  compression: xz

contents:
  # binary
  - src: .build/tedge
    dst: /usr/bin/
    file_info:
      mode: 755

scripts:
  preinstall: configuration/debian/tedge/preinst
  postinstall: configuration/debian/tedge/postinst
  postremove: configuration/debian/tedge/postrm
