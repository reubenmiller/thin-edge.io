# yaml-language-server: $schema=https://nfpm.goreleaser.com/static/schema.json
---
name: tedge
description: |
  CLI tool use to control and configure thin-edge.io
  tedge provides:
   * mqtt publish/subscribe
   * configuration get/set
   * connect/disconnect cloud mappers
arch: "${PKG_ARCH}"
platform: "linux"
version: "${GIT_SEMVER}"
section: misc
priority: "optional"
maintainer: "thin-edge.io team <info@thin-edge.io>"
vendor: "thin-edge.io"
homepage: "https://thin-edge.io"
license: "Apache-2.0"

recommends:
  - mosquitto

overrides:
  deb:
    depends:
      - adduser
  rpm:
    depends:
      - adduser

deb:
  fields:
    Vcs-Browser: ${CI_PROJECT_URL}
    Vcs-Git: ${CI_PROJECT_URL}
  compression: xz

contents:
  # binary
  - src: .build/tedge
    dst: /usr/bin/

  - src: ./configuration/packaging/copyright
    dst: /usr/share/doc/tedge/copyright
    packager: deb
    file_info:
      mode: 0644

scripts:
  preinstall: configuration/debian/tedge/preinst
  postinstall: configuration/debian/tedge/postinst
  postremove: configuration/debian/tedge/postrm
