# yaml-language-server: $schema=https://nfpm.goreleaser.com/static/schema.json
---
name: "tedge-agent"
description: |
  tedge-agent interacts with a Cloud Mapper and one or more Software Plugins
arch: "${PKG_ARCH}"
platform: "linux"
version: "${GIT_SEMVER}"
section: "default"
priority: "optional"
maintainer: "thin-edge.io team <info@thin-edge.io>"
vendor: "thin-edge.io"
homepage: "https://thin-edge.io"
license: "Apache-2.0"

replaces:
  - tedge_agent
provides:
  - tedge_agent
conflicts:
  - tedge_agent (<= 0.8.1)
recommends:
  - mosquitto

deb:
  fields:
    Vcs-Browser: ${CI_PROJECT_URL}
    Vcs-Git: ${CI_PROJECT_URL}
  compression: xz
  breaks:
    - tedge_agent (<= 0.8.1)

contents:
  # binary
  - src: .build/tedge-agent
    dst: /usr/bin/
    file_info:
      mode: 755

  # service definitions
  - src: ./configuration/init/systemd/tedge-agent.service
    dst: /lib/systemd/system/tedge-agent.service
    file_info:
      mode: 644

  # Symlink for backwards compatibility
  # Deprecate: Remove symlink in 1.x release
  - src: /usr/bin/tedge-agent
    dst: /usr/bin/tedge_agent
    type: symlink

scripts:
  postinstall: configuration/debian/tedge-agent/postinst
  postremove: configuration/debian/tedge-agent/postrm
  preremove: configuration/debian/tedge-agent/prerm
